{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Ambady Estate Munnar</title>
    <link rel="icon" type="image/png" href="{% static 'ambadyestate-main/image/favicon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow-x: hidden;
            font-family: 'DM Sans', sans-serif;
            background: #0b3128;
        }

        .error-404-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .error-404-bg {
            position: absolute;
            inset: 0;
            background-image: url('{% static "ambadyestate-main/image/pack.png" %}');
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100%;
            transform: scale(1.05);
        }

        .error-404-overlay {
            position: absolute;
            inset: 0;
            background: rgba(7, 31, 25, 0.78);
            z-index: 1;
        }

        .error-404-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            max-width: 640px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .error-404-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        .error-404-eyebrow i {
            display: block;
            width: 26px;
            height: 1.5px;
            background: #c8a86a;
        }

        .error-404-code {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(5rem, 14vw, 9rem);
            font-weight: 800;
            color: #c8a86a;
            line-height: 1;
            margin-top: 8px;
            text-shadow: 0 6px 30px rgba(0, 0, 0, 0.35);
        }

        .error-404-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            font-weight: 300;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .error-404-sub {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1rem;
            line-height: 1.7;
        }

        .error-404-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }

        .error-404-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #c8a86a;
            color: #142822;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 15px 30px;
            border-radius: 100px;
            text-decoration: none;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .error-404-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.08);
        }

        .error-404-link {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
            font-size: 0.92rem;
            text-decoration: underline;
            text-underline-offset: 4px;
            transition: color 0.3s ease;
        }

        .error-404-link:hover {
            color: #c8a86a;
        }

        @media (max-width: 767px) {
            .error-404-code { font-size: clamp(3.6rem, 20vw, 6rem); }
            .error-404-title { font-size: 1.4rem; }
            .error-404-sub { font-size: 0.92rem; }
        }
    </style>
</head>
<body>

    <section class="error-404-section">
        <div class="error-404-bg"></div>
        <div class="error-404-overlay"></div>

        <div class="error-404-content">
            <span class="error-404-eyebrow"><i></i>Ambady Estate, Munnar</span>
            <h1 class="error-404-code">404</h1>
            <h2 class="error-404-title">This path leads nowhere</h2>
            <p class="error-404-sub">
                The page you're looking for may have moved, been renamed,
                or never existed. Let's get you back to solid ground.
            </p>

            <div class="error-404-actions">
                <a href="{% url 'ambadyestate_app:home' %}" class="error-404-btn">
                    <span>Back to Home</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
                <a href="{% url 'ambadyestate_app:packages_page' %}" class="error-404-link">
                    Explore Packages
                </a>
            </div>
        </div>
    </section>

</body>
</html>
